<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoScan</title>
  <style>
    :root {
      --green-900: #12372a;
      --green-700: #1f6f4a;
      --green-600: #278a57;
      --green-100: #e7f6ee;
      --mint: #c9f2dc;
      --white: #ffffff;
      --gray-900: #1f2933;
      --gray-700: #52606d;
      --gray-500: #7b8794;
      --gray-200: #d9e2ec;
      --gray-100: #f5f7fa;
      --amber: #f4b740;
      --shadow: 0 20px 48px rgba(18, 55, 42, 0.16);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--gray-100);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--gray-900);
      background:
        radial-gradient(circle at top right, rgba(201, 242, 220, 0.75), transparent 34rem),
        linear-gradient(180deg, #f8fbf9 0%, #edf6f1 48%, #f5f7fa 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 16px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .hero {
      display: grid;
      gap: 14px;
      padding: 10px 2px 0;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: var(--green-900);
      background: linear-gradient(135deg, var(--mint), #ffffff);
      box-shadow: 0 10px 24px rgba(31, 111, 74, 0.18);
    }

    .brand-mark svg {
      width: 28px;
      height: 28px;
    }

    h1 {
      margin: 0;
      color: var(--green-900);
      font-size: clamp(2.25rem, 12vw, 4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--gray-700);
      font-size: 1.03rem;
      line-height: 1.5;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      min-height: 78px;
      padding: 14px;
      border: 1px solid rgba(31, 111, 74, 0.14);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(12px);
    }

    .stat strong {
      display: block;
      color: var(--green-700);
      font-size: 1.5rem;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--gray-700);
      font-size: 0.82rem;
      line-height: 1.25;
    }

    .panel {
      border: 1px solid rgba(31, 111, 74, 0.14);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    form {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .field-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--green-900);
      font-size: 0.9rem;
      font-weight: 750;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 12px 13px;
      color: var(--gray-900);
      background: var(--white);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--green-700) 50%),
        linear-gradient(135deg, var(--green-700) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) 52%,
        calc(100% - 14px) 52%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 44px;
    }

    input:focus,
    select:focus {
      border-color: var(--green-600);
      box-shadow: 0 0 0 4px rgba(39, 138, 87, 0.14);
      background: #fbfffd;
    }

    .points-preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 12px 14px;
      border: 1px solid rgba(244, 183, 64, 0.36);
      border-radius: var(--radius);
      background: #fff9eb;
    }

    .points-preview span {
      color: var(--gray-700);
      font-size: 0.9rem;
      line-height: 1.25;
    }

    .points-preview strong {
      flex: 0 0 auto;
      color: var(--green-900);
      font-size: 1.15rem;
    }

    .submit-button {
      min-height: 52px;
      border: 0;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 16px;
      color: var(--white);
      background: linear-gradient(135deg, var(--green-700), var(--green-600));
      box-shadow: 0 14px 26px rgba(31, 111, 74, 0.26);
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .submit-button svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .submit-button:hover {
      filter: brightness(1.03);
      box-shadow: 0 18px 34px rgba(31, 111, 74, 0.31);
      transform: translateY(-1px);
    }

    .submit-button:active {
      transform: translateY(0);
      box-shadow: 0 10px 20px rgba(31, 111, 74, 0.2);
    }

    .success-message {
      margin: 0 18px 18px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(8px);
      transition: max-height 260ms ease, opacity 220ms ease, transform 220ms ease, padding 220ms ease;
    }

    .success-message.is-visible {
      max-height: 220px;
      opacity: 1;
      transform: translateY(0);
      padding: 14px;
      border: 1px solid rgba(39, 138, 87, 0.22);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #effcf5, #ffffff);
    }

    .success-content {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .success-icon {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: var(--white);
      background: var(--green-600);
    }

    .success-icon svg {
      width: 22px;
      height: 22px;
    }

    .success-copy strong {
      display: block;
      margin-bottom: 3px;
      color: var(--green-900);
      font-size: 0.98rem;
    }

    .success-copy p {
      margin: 0;
      color: var(--gray-700);
      font-size: 0.9rem;
      line-height: 1.38;
    }

    .footer-note {
      margin: 0;
      color: var(--gray-500);
      font-size: 0.78rem;
      line-height: 1.4;
      text-align: center;
    }

    @media (min-width: 620px) {
      .page {
        padding: 34px 24px;
        gap: 22px;
      }

      .hero {
        padding-top: 0;
      }

      .subtitle {
        max-width: 560px;
        font-size: 1.12rem;
      }

      form {
        padding: 24px;
        gap: 18px;
      }

      .field-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .success-message {
        margin-inline: 24px;
        margin-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero" aria-labelledby="page-title">
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M6.7 13.5C4.7 11 5 7.5 7.4 5.4C9.8 3.2 13.1 3.2 16.2 4.2C16.8 7.4 16.4 10.9 14 13.1C11.9 15 9 15.2 6.7 13.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
            <path d="M5 20C7.4 14.7 10.8 10.8 16 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            <path d="M15.7 15.3C17.3 15.1 18.5 15.5 19.5 16.5C18.9 18.3 17.8 19.5 16.3 20C14.9 20.4 13.5 20 12.4 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div>
          <h1 id="page-title">EcoScan</h1>
        </div>
      </div>
      <p class="subtitle">Recicla, registra tu aporte y suma puntos por cada residuo entregado.</p>
      <section class="stats-strip" aria-label="Resumen de EcoScan">
        <div class="stat">
          <strong id="total-points">0</strong>
          <span>Puntos acumulados hoy</span>
        </div>
        <div class="stat">
          <strong id="total-scans">0</strong>
          <span>Registros realizados</span>
        </div>
      </section>
    </header>

    <section class="panel" aria-label="Formulario de registro de reciclaje">
      <form id="recycle-form">
        <div class="field-grid">
          <div class="field">
            <label for="nombres">Nombres</label>
            <input id="nombres" name="nombres" type="text" autocomplete="given-name" required />
          </div>

          <div class="field">
            <label for="apellidos">Apellidos</label>
            <input id="apellidos" name="apellidos" type="text" autocomplete="family-name" required />
          </div>

          <div class="field">
            <label for="edad">Edad</label>
            <input id="edad" name="edad" type="number" min="1" max="120" inputmode="numeric" required />
          </div>

          <div class="field">
            <label for="fecha">Fecha</label>
            <input id="fecha" name="fecha" type="date" required />
          </div>

          <div class="field full">
            <label for="tipoResiduo">Tipo de Residuo</label>
            <select id="tipoResiduo" name="tipoResiduo" required>
              <option value="" selected disabled>Selecciona una opción</option>
              <option value="Cartón">Cartón</option>
              <option value="Papel">Papel</option>
              <option value="Plástico">Plástico</option>
              <option value="Tetrapack">Tetrapack</option>
            </select>
          </div>
        </div>

        <div class="points-preview" aria-live="polite">
          <span>Puntos estimados para este registro</span>
          <strong id="points-preview">+10</strong>
        </div>

        <button class="submit-button" type="submit">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Registrar y Sumar Puntos
        </button>
      </form>

      <div id="success-message" class="success-message" role="status" aria-live="polite"></div>
    </section>

    <p class="footer-note">EcoScan registra acciones de reciclaje mediante QR.</p>
  </main>

  <script>
    const form = document.getElementById("recycle-form");
    const successMessage = document.getElementById("success-message");
    const residueSelect = document.getElementById("tipoResiduo");
    const pointsPreview = document.getElementById("points-preview");
    const totalPointsEl = document.getElementById("total-points");
    const totalScansEl = document.getElementById("total-scans");

    const pointsByResidue = {
      "Cartón": 12,
      "Papel": 8,
      "Plástico": 15,
      "Tetrapack": 18
    };

    let totalPoints = 0;
    let totalScans = 0;
    let cleanTimer;

    function getLocalDateValue(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function escapeHTML(value) {
      return value.replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[character]));
    }

    const today = getLocalDateValue();
    document.getElementById("fecha").value = today;

    function getSelectedPoints() {
      return pointsByResidue[residueSelect.value] || 10;
    }

    function updatePreview() {
      pointsPreview.textContent = `+${getSelectedPoints()}`;
    }

    function renderSuccess(data, points) {
      successMessage.innerHTML = `
        <div class="success-content">
          <div class="success-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
          <div class="success-copy">
            <strong>Registro completado</strong>
            <p>${escapeHTML(data.nombres)} sumó ${points} puntos por reciclar ${escapeHTML(data.tipoResiduo.toLowerCase())}.</p>
          </div>
        </div>
      `;
      successMessage.classList.add("is-visible");
    }

    residueSelect.addEventListener("change", updatePreview);

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      const points = getSelectedPoints();

      totalPoints += points;
      totalScans += 1;
      totalPointsEl.textContent = totalPoints;
      totalScansEl.textContent = totalScans;

      renderSuccess(data, points);

      clearTimeout(cleanTimer);
      cleanTimer = setTimeout(() => {
        form.reset();
        document.getElementById("fecha").value = today;
        updatePreview();
        successMessage.classList.remove("is-visible");
      }, 3000);
    });

    updatePreview();
  </script>
</body>
</html>
